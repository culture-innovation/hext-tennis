<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HEXT Tennis</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--court:#2D6A4F;--court-bg:#F0FAF4;--court-mid:#D8F3E8;--red:#E53E3E;--red-bg:#FFF5F5;--amber:#D97706;--amber-bg:#FFFBEB;--bg:#F8F9FA;--white:#FFFFFF;--border:#EAECEF;--border2:#D1D5DB;--text:#191F28;--text2:#6B7684;--text3:#B0B8C1;--r:12px;--rl:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}
/* PIN */
.pin-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--white);padding:40px 20px;}
.pin-screen.active{display:flex;}
.pin-logo{font-size:22px;font-weight:700;margin-bottom:6px;}.pin-logo span{color:var(--court);}
.pin-sub{font-size:14px;color:var(--text2);margin-bottom:40px;}
.pin-sel-wrap{width:100%;max-width:300px;margin-bottom:28px;}
.pin-sel-wrap select{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'Noto Sans KR',sans-serif;font-weight:600;outline:none;appearance:none;text-align:center;}
.pin-dots{display:flex;gap:16px;margin-bottom:36px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:var(--white);transition:all .15s;}
.pin-dot.filled{background:var(--court);border-color:var(--court);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-key{aspect-ratio:1;border-radius:50%;border:none;background:var(--bg);font-size:22px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:'Noto Sans KR',sans-serif;}
.pin-key:active{background:var(--court-mid);transform:scale(.93);}
.pin-key.del{font-size:16px;color:var(--text2);}
.pin-key.empty{background:none;cursor:default;}
.pin-err{font-size:13px;color:var(--red);margin-top:16px;height:18px;}
/* APP */
.app-header{background:var(--white);padding:16px 20px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:17px;font-weight:700;letter-spacing:-.3px;}.logo span{color:var(--court);}
.user-badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--court-bg);color:var(--court);}
.user-badge.admin{background:#FEF2F2;color:var(--red);}
.logout-btn{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 8px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;color:var(--text3);font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;gap:3px;}
.nav-btn svg{width:22px;height:22px;}.nav-btn.active{color:var(--court);}
.page{display:none;padding-bottom:88px;}.page.active{display:block;}
/* COMMON */
.card{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
.card-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text2);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .12s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--court);color:#fff;}
.btn-secondary{background:var(--court-bg);color:var(--court);}
.btn-ghost{background:var(--bg);color:var(--text2);border:1px solid var(--border2);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}.btn-block{width:100%;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;}
.badge-A{background:#FEF2F2;color:#DC2626;}.badge-B{background:#EFF6FF;color:#2563EB;}
.badge-C{background:var(--court-bg);color:var(--court);}.badge-D{background:#F5F3FF;color:#7C3AED;}
.badge-M{background:#EFF6FF;color:#1D4ED8;}.badge-F{background:#FDF2F8;color:#9D174D;}
.badge-win{background:var(--court-bg);color:var(--court);}
.badge-lose{background:var(--red-bg);color:var(--red);}
.badge-draw{background:var(--amber-bg);color:var(--amber);}
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:57px;z-index:90;}
.tab-item{padding:13px 16px;font-size:14px;font-weight:500;color:var(--text2);background:none;border:none;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;}
.tab-item.active{color:var(--court);border-bottom-color:var(--court);font-weight:700;}
.form-group{margin-bottom:16px;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:block;}
.form-input,.form-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--court);background:#fff;}
.tg{display:flex;gap:8px;flex-wrap:wrap;}
.tb{flex:1;min-width:60px;padding:9px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.tb.sel{border-color:var(--court);background:var(--court-bg);color:var(--court);font-weight:600;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;}
.mo.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:0 0 20px;width:100%;max-height:92vh;overflow-y:auto;animation:su .22s cubic-bezier(.32,.72,0,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhw{padding:12px 20px 0;}.mh{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto;}
.mhead{padding:14px 20px 16px;}.mtitle{font-size:18px;font-weight:700;letter-spacing:-.4px;}
.msub{font-size:13px;color:var(--text2);margin-top:3px;}
.mbody{padding:0 20px;}.mfoot{padding:16px 20px 0;display:flex;gap:10px;}
.li{display:flex;align-items:center;padding:14px 18px;gap:12px;background:var(--white);border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.av-M{background:#EFF6FF;color:#2563EB;}.av-F{background:#FDF2F8;color:#9D174D;}
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:15px;color:var(--text2);}
.stat-row{display:flex;gap:10px;}
.stat-box{flex:1;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;}
.sv{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;}
.sv.g{color:var(--court);}.sv.r{color:var(--red);}
.sl{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500;}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
.pbf{height:100%;background:var(--court);border-radius:2px;}
.fb{display:flex;align-items:center;justify-content:space-between;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;}
.toast.show{opacity:1;}
.ldo{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:500;}
.sp2{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--court);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* ATTENDANCE */
.att-section{background:var(--white);border-bottom:1px solid var(--border);}
.att-header{padding:12px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.att-grid{display:flex;flex-wrap:wrap;gap:8px;padding:10px 18px 14px;}
.att-chip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:2px solid var(--border);background:var(--white);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;position:relative;}
.slot-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.chip-menu{position:absolute;top:110%;left:0;z-index:50;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:170px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.cm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;}
.cm-item:active{background:var(--bg);}
.cm-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* ROUNDS */
.rounds-wrap{padding:0 20px;}
.round-section{margin-bottom:12px;}
.round-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--white);border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;}
.round-label{font-size:13px;font-weight:700;color:var(--court);}
.round-time-btn{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.round-body{background:var(--white);border:1px solid var(--border);border-radius:0 0 10px 10px;padding:10px 12px;}
/* MATCH CARD */
.match-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;transition:border-color .15s;}
.match-card:last-child{margin-bottom:0;}
.match-card.drag-target{border:2px dashed var(--court);background:var(--court-bg);}
.court-lbl{font-size:10px;font-weight:700;color:var(--court);letter-spacing:.5px;margin-bottom:8px;}
.teams-row{display:flex;align-items:stretch;gap:8px;}
.team-col{flex:1;background:var(--white);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
.team-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.5px;margin-bottom:5px;}
/* PLAYER CARD - draggable */
.pc{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:grab;user-select:none;touch-action:none;transition:opacity .15s,border-color .15s;}
.pc:last-child{margin-bottom:0;}
.pc.is-dragging{opacity:.35;border-style:dashed;cursor:grabbing;}
.pc.drag-over-p{border-color:var(--court);background:var(--court-bg);}
.pc .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pc .pname{font-size:13px;font-weight:600;flex:1;}
.pc .grip{font-size:13px;color:var(--text3);}
.empty-slot{min-height:36px;border:1.5px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);}
.empty-slot.drag-over-p{border-color:var(--court);background:var(--court-bg);}
/* SCORE */
.score-inline{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.score-quick{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.sq-btn{padding:5px 9px;border-radius:7px;border:1.5px solid var(--border2);background:var(--white);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.sq-btn:active{background:var(--court-bg);border-color:var(--court);color:var(--court);}
.score-in{flex:1;min-width:50px;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;padding:8px 4px;color:var(--text);font-size:20px;font-weight:700;text-align:center;font-family:'Noto Sans KR',sans-serif;outline:none;}
.score-in:focus{border-color:var(--court);background:#fff;}
.score-sep{font-size:16px;font-weight:700;color:var(--text3);flex-shrink:0;}
.score-save{padding:8px 14px;border-radius:8px;background:var(--court);color:#fff;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
.score-result{display:flex;align-items:center;gap:8px;margin-top:10px;}
.score-box{flex:1;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.snum{font-size:20px;font-weight:700;}
.ssep2{font-size:14px;font-weight:600;color:var(--text3);}
/* RANKING */
.ri{display:flex;align-items:center;padding:13px 18px;gap:12px;border-bottom:1px solid var(--border);}
.ri:last-child{border-bottom:none;}
.rn{font-size:15px;font-weight:700;width:24px;text-align:center;color:var(--text3);flex-shrink:0;}
.rn.r1{color:#F59E0B;}.rn.r2{color:#9CA3AF;}.rn.r3{color:#B45309;}
.rinfo{flex:1;}
.rnm{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;}
.rst{font-size:12px;color:var(--text2);margin-top:2px;}
.rr{font-size:15px;font-weight:700;color:var(--court);}
/* MYPAGE */
.my-hero{background:var(--court);color:white;padding:28px 20px 24px;}
.my-name{font-size:22px;font-weight:700;letter-spacing:-.4px;}
.my-meta{font-size:13px;opacity:.8;margin-top:4px;}
.my-sr{display:flex;gap:2px;margin-top:20px;}
.my-sb{flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:12px 10px;text-align:center;}
.my-sv{font-size:24px;font-weight:700;}.my-sl{font-size:11px;opacity:.8;margin-top:2px;}
.period-wrap{display:flex;gap:8px;padding:14px 20px;}
.pb2{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.pb2.active{border-color:var(--court);background:var(--court-bg);color:var(--court);}
.pair-item{display:flex;align-items:center;padding:13px 18px;gap:12px;border-bottom:1px solid var(--border);}
.pair-item:last-child{border-bottom:none;}
.pr{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
.pi{flex:1;}.pn{font-size:14px;font-weight:600;}.ps{font-size:12px;color:var(--text2);margin-top:2px;}
.prate{font-size:16px;font-weight:700;}.prate.good{color:var(--court);}.prate.bad{color:var(--red);}
.cs-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.cs{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.cs.sel{border-color:var(--text);transform:scale(1.1);}
.court-check-list{display:flex;flex-direction:column;gap:8px;}
.cc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;}
.cc-item.sel{border-color:var(--court);background:var(--court-bg);}
/* round time grid */
.rt-grid{display:flex;flex-direction:column;gap:8px;}
.rt-row{display:flex;align-items:center;gap:10px;}
.rt-lbl{font-size:13px;font-weight:600;color:var(--court);width:32px;flex-shrink:0;}
.rt-input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.rt-input:focus{border-color:var(--court);background:#fff;}
</style>
</head>
<body>
<div class="ldo" id="ldo"><div class="sp2"></div></div>

<!-- PIN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">HEXT <span>Tennis</span></div>
  <div class="pin-sub">PIN으로 로그인하세요</div>
  <div class="pin-sel-wrap">
    <select id="pinSel" onchange="onSelChange()"><option value="">회원을 선택하세요</option></select>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pi('1')">1</button><button class="pin-key" onclick="pi('2')">2</button><button class="pin-key" onclick="pi('3')">3</button>
    <button class="pin-key" onclick="pi('4')">4</button><button class="pin-key" onclick="pi('5')">5</button><button class="pin-key" onclick="pi('6')">6</button>
    <button class="pin-key" onclick="pi('7')">7</button><button class="pin-key" onclick="pi('8')">8</button><button class="pin-key" onclick="pi('9')">9</button>
    <div class="pin-key empty"></div><button class="pin-key" onclick="pi('0')">0</button><button class="pin-key del" onclick="pd()">⌫</button>
  </div>
  <div class="pin-err" id="pinErr"></div>
</div>

<!-- APP -->
<div class="screen" id="appScreen">
  <div class="app-header">
    <div class="logo">HEXT <span>Tennis</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="user-badge" id="userBadge"></div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="bottom-nav" id="adminNav" style="display:none;">
    <button class="nav-btn active" onclick="sp('schedule')" id="nav-schedule">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>대진
    </button>
    <button class="nav-btn" onclick="sp('mgmt')" id="nav-mgmt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>회원
    </button>
    <button class="nav-btn" onclick="sp('records')" id="nav-records">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>경기기록
    </button>
    <button class="nav-btn" onclick="sp('ranking')" id="nav-ranking">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.5 21H2V9h5.5v12zm7.25-18h-5.5v18h5.5V3zM22 11h-5.5v10H22V11z"/></svg>랭킹

function fmtD(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}월 ${dt.getDate()}일 (${['일','월','화','수','목','금','토'][dt.getDay()]})`;}
function gP(id){return members.find(m=>m.id===id);}
function getRange(p,yr){
  const now=new Date();
  const y=yr?parseInt(yr):now.getFullYear();
  const mo=now.getFullYear()===y?now.getMonth():11; // 다른 연도면 연말 기준
  const eDate=now.getFullYear()===y?now:new Date(y,11,31);
  let s;
  if(p==='quarter')s=new Date(y,Math.floor(mo/3)*3,1);
  else if(p==='half')s=new Date(y,mo<6?0:6,1);
  else if(p==='year')s=new Date(y,0,1);
  else s=new Date('2000-01-01');
  return{s:s.toISOString().split('T')[0],e:eDate.toISOString().split('T')[0]};
}
function getPeriodLabel(p,yr){
  const now=new Date();
  const y=yr?parseInt(yr):now.getFullYear();
  const mo=now.getFullYear()===y?now.getMonth():11;
  if(p==='quarter')return`${y}년 ${Math.floor(mo/3)+1}분기`;
  if(p==='half')return`${y}년 ${mo<6?'상':'하'}반기`;
  if(p==='year')return`${y}년`;
  return '전체';
}
function getAvailYears(){

}

function renderSetupSelect(){

function loadSetup(){
  const sid=document.getElementById('setupSelect').value;
  if(!sid){return;}
  const setup=setups.find(s=>s.id===sid);
  if(!setup)return;
  nsRounds=setup.rounds;
  document.getElementById('nsRoundsSelect').value=String(nsRounds);
  // court names — handle both array and string formats
  const cn=setup.court_names||[];
  document.getElementById('courtNamesInput').value=Array.isArray(cn)?cn.join(', '):cn;
  // round times
  let rts=[];
  try{rts=JSON.parse(setup.round_times||'[]');}catch{rts=[];}
  nsRoundTimes=[...rts];
  renderRtGridFromData(rts,nsRounds);
}

function onRoundsChange(){
  nsRounds=parseInt(document.getElementById('nsRoundsSelect').value)||5;
  // rebuild grid keeping existing times, extending/trimming as needed
  const existing=collectRtFromInputs();
  renderRtGridFromData(existing,nsRounds);
}

function renderRtGrid(){
  // default: build from 06:15, each round ~30min with 5min break
  const defaults=[
    {r:1,s:'06:15',e:'06:45'},
    {r:2,s:'06:45',e:'07:30'},
    {r:3,s:'07:30',e:'08:00'},
    {r:4,s:'08:00',e:'08:30'},
    {r:5,s:'08:30',e:'09:00'},
    {r:6,s:'09:00',e:'09:30'},
    {r:7,s:'09:30',e:'10:00'},
    {r:8,s:'10:00',e:'10:30'},
  ];
  renderRtGridFromData(defaults.slice(0,nsRounds),nsRounds);
}

function renderRtGridFromData(rts,count){
  const n=count||nsRounds;
  const grid=document.getElementById('rtGrid');
  nsRoundTimes=[];
  const rows=Array.from({length:n},(_,i)=>{
    const existing=rts[i];
    const s=existing?.s||'06:00';
    const e=existing?.e||addMins(s,30);
    nsRoundTimes.push({r:i+1,s,e});
    return`<div class="rt-row" id="rt-row-${i+1}">
      <span class="rt-lbl">R${i+1}</span>
      <input class="rt-input" type="time" id="rt-s-${i+1}" value="${s}" onchange="onRtStartChange(${i+1},this.value)">
      <span style="font-size:12px;color:var(--text3);padding:0 2px;">~</span>
      <input class="rt-input" type="time" id="rt-e-${i+1}" value="${e}" onchange="onRtEndChange(${i+1},this.value)">
    </div>`;
  });
  grid.innerHTML=rows.join('');
}

function onRtStartChange(r,val){
  // update stored
  if(nsRoundTimes[r-1])nsRoundTimes[r-1].s=val;
}
function onRtEndChange(r,val){
  if(nsRoundTimes[r-1])nsRoundTimes[r-1].e=val;
  // cascade: next round's start = this round's end
  const nextEl=document.getElementById(`rt-s-${r+1}`);
  if(nextEl){
    nextEl.value=val;
    if(nsRoundTimes[r])nsRoundTimes[r].s=val;
  }
}

function collectRtFromInputs(){
  return Array.from({length:nsRounds},(_,i)=>({
    r:i+1,
    s:document.getElementById(`rt-s-${i+1}`)?.value||'06:00',
    e:document.getElementById(`rt-e-${i+1}`)?.value||'06:30'
  }));
}

async function createSess(){

  const rts=collectRtFromInputs();
  ld(true);
  const{data,error}=await db.from('sessions').insert({
    date,courts:courtNames.length,rounds:nsRounds,status:'draft',
    start_time:rts[0]?.s||'06:00',round_minutes:30,
    court_ids:[],court_names:courtNames,
    round_times:JSON.stringify(rts)

  ld(false);

}

    style="color:${a?sl?.hex_color||'var(--court)':'var(--text2)'};border-color:${a?sl?.hex_color||'var(--court)':'var(--border)'};"
    onclick="${CU?.is_admin?`toggleMenu('${p.id}')`:''}">

function renderAtt(){
  const attMemberIds=curAtt.map(a=>a.member_id);
  const sid=curSess?.id||'';
  const isGuestHere=m=>m.type==='guest'&&(m.guest_session_id===sid||!m.guest_session_id);

  // 정회원 목록: 관리자는 전체, 회원은 출석 처리된 사람만
  const regularList=CU?.is_admin
    ? members.filter(m=>m.active&&m.type==='regular')
    : members.filter(m=>m.active&&m.type==='regular'&&attMemberIds.includes(m.id));

  // 게스트 목록: 이 세션 소속 게스트
  const guestList=CU?.is_admin
    ? members.filter(m=>m.active&&isGuestHere(m))
    : members.filter(m=>m.active&&isGuestHere(m)&&attMemberIds.includes(m.id));

  const regularAtt=regularList.filter(p=>attMemberIds.includes(p.id)).length;
  const guestAtt=guestList.filter(p=>attMemberIds.includes(p.id)).length;
  const totalAtt=attMemberIds.length;

  document.getElementById('attCount').textContent=`${totalAtt}명 참석`;
  document.getElementById('attRegularCount').textContent=`${regularAtt}/${regularList.length}명`;
  document.getElementById('attGuestCount').textContent=`${guestAtt}/${guestList.length}명`;

  // 게스트 섹션 - 게스트가 없으면 숨기기
  document.getElementById('attGuestSection').style.display=guestList.length>0?'block':'none';

  document.getElementById('attGridRegular').innerHTML=regularList.map(p=>{
    const a=curAtt.find(a=>a.member_id===p.id);
    return makeChip(p,a);
  }).join('');

  document.getElementById('attGridGuest').innerHTML=guestList.map(p=>{
    const a=curAtt.find(a=>a.member_id===p.id);
    return makeChip(p,a);
  }).join('');
}

async function setAtt(pid,slotId){

  const ex=curAtt.find(a=>a.member_id===pid);

// ── SCHEDULE GEN ──
function canPlayRound(memberId,roundNum){
  const att=curAtt.find(a=>a.member_id===memberId);
  if(!att||!att.slot)return false;
  const sl=att.slot;
  const rts=getRoundTimes();const rt=rts.find(x=>x.r===roundNum);
  if(!rt)return true;
  return sl.start_time<=rt.s&&sl.end_time>=rt.e;
}

  if(!curSess){toast('세션을 선택하세요');return;}
  ld(true);

  const updates=[];

function buildMatches(pids,rounds,numCourts){
  const res=[];
  const pairCount={},gameCount={},playCount={};
  // 초보자와 같이 게임한 횟수 추적: beginnerGameCount[playerId][beginnerId] = 횟수
  const beginnerGameCount={};
  const pk=(a,b)=>[a,b].sort().join('|');
  const gk=arr=>[...arr].sort().join('|');
  pids.forEach(p=>{playCount[p]=0;beginnerGameCount[p]={};});

  const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

  // 초보자 판별: NTRP <= 2.0 또는 레벨 D
  const isBeginnerPid=pid=>{
    const m=members.find(x=>x.id===pid);
    if(!m)return false;
    const lv=parseFloat(m.level)||0;
    return lv>0&&lv<=2.0;
  };
  const beginners=pids.filter(isBeginnerPid);

  // 각 선수 참가 가능 라운드 캐시
  const arCache={};
  pids.forEach(p=>{
    arCache[p]=Array.from({length:rounds},(_,i)=>i+1).filter(r=>canPlayRound(p,r));
  });

  const isFullTime=pid=>arCache[pid].length===rounds;
  const isGuestPid=pid=>{const m=members.find(x=>x.id===pid);return m&&m.type==='guest';};

  const totalSlots=rounds*numCourts*4;
  const avgGames=totalSlots/Math.max(1,pids.length);
  const getTarget=pid=>isFullTime(pid)?Math.max(4,Math.round(avgGames)):Math.max(3,arCache[pid].length);

  // 게스트 첫 2라운드 연속 보장
  const guestConsecRounds={};
  pids.filter(isGuestPid).forEach(pid=>{
    const ar=arCache[pid];
    if(ar.length>=2)guestConsecRounds[pid]=[ar[0],ar[1]];
    else if(ar.length===1)guestConsecRounds[pid]=[ar[0]];
  });

  // 초보자 공평 배분을 위한 불균형 점수 계산
  // 각 초보자에 대해 선수별로 같이 게임한 횟수의 최대-최소 편차를 최소화
  const beginnerImbalanceScore=(pid,gamePlayerIds)=>{
    if(!beginners.length)return 0;
    let score=0;
    beginners.forEach(bid=>{
      if(gamePlayerIds.includes(bid)&&bid!==pid){
        // 이 pid가 bid와 같이 게임하게 되는 경우
        const myCount=(beginnerGameCount[pid]?.[bid]||0)+1;
        // 다른 non-beginner 선수들의 bid와의 게임 횟수 평균
        const others=pids.filter(x=>x!==pid&&x!==bid&&!isBeginnerPid(x));
        const avgOther=others.length?others.reduce((s,x)=>s+(beginnerGameCount[x]?.[bid]||0),0)/others.length:0;
        // 내가 평균보다 많이 같이 하면 패널티
        score+=Math.max(0,myCount-avgOther-1)*50;
      }
    });
    return score;
  };

  for(let r=1;r<=rounds;r++){
    const avail=pids.filter(pid=>canPlayRound(pid,r));
    if(avail.length<4)continue;

    const actualCourts=Math.min(numCourts,Math.floor(avail.length/4));
    const slotsNeeded=actualCourts*4;

    const scoreOf=pid=>{
      const g=playCount[pid]||0;
      const tgt=getTarget(pid);
      const ar=arCache[pid];
      const remainRounds=ar.filter(x=>x>=r).length;
      const gapToTarget=tgt-g;

      let score=g*10;
      if(ar.length>0&&ar[0]===r)score-=800;

      if(isGuestPid(pid)){
        const cr=guestConsecRounds[pid]||[];
        if(cr.includes(r)&&g<2)score-=1200;
      }

      if(gapToTarget>0){
        const urgency=gapToTarget/Math.max(1,remainRounds);
        score-=urgency*300;
      }

      score+=Math.random()*0.5;
      return score;
    };

    const ranked=shuffle(avail).map(pid=>({pid,score:scoreOf(pid)})).sort((a,b)=>a.score-b.score);
    // 중복 없이 unique ID만 selected에 포함
    const seen=new Set();
    const selected=[];
    for(const{pid} of ranked){
      if(!seen.has(pid)&&selected.length<slotsNeeded){seen.add(pid);selected.push(pid);}
    }
    const resting=avail.filter(p=>!selected.includes(p));

    const pool_all=shuffle(selected);

    for(let c=0;c<actualCourts;c++){
      const pool=pool_all.slice(c*4,(c+1)*4);
      if(pool.length<4)continue;

      // 페어 중복 + 초보자 불균형 최소화
      let best=Infinity,bp=null;
      const perms=[[0,1,2,3],[0,2,1,3],[0,3,1,2]];
      for(let trial=0;trial<10;trial++){
        const tp=trial===0?pool:shuffle(pool);
        perms.forEach(([a,b,cc,d])=>{
          const t1=[tp[a],tp[b]],t2=[tp[cc],tp[d]];
          const allFour=[tp[a],tp[b],tp[cc],tp[d]];
          // 페어 중복
          const pairSc=(pairCount[pk(t1[0],t1[1])]||0)*10+(pairCount[pk(t2[0],t2[1])]||0)*10;
          // 같은 게임 중복
          const gameSc=(gameCount[gk(allFour)]||0)*4;
          // 초보자 불균형
          let beginnerSc=0;
          allFour.forEach(pid=>{
            if(!isBeginnerPid(pid)){
              beginnerSc+=beginnerImbalanceScore(pid,allFour);
            }
          });
          const sc=pairSc+gameSc+beginnerSc+Math.random()*0.3;
          if(sc<best){best=sc;bp=[tp[a],tp[b],tp[cc],tp[d]];}
        });
      }

      const[p1,p2,p3,p4]=bp;
      const t1=[p1,p2],t2=[p3,p4];
      const allFour=[p1,p2,p3,p4];

      // 초보자 게임 횟수 업데이트
      beginners.forEach(bid=>{
        if(allFour.includes(bid)){
          allFour.filter(x=>x!==bid).forEach(pid=>{
            if(!beginnerGameCount[pid])beginnerGameCount[pid]={};
            beginnerGameCount[pid][bid]=(beginnerGameCount[pid][bid]||0)+1;
          });
        }
      });

      pairCount[pk(t1[0],t1[1])]=(pairCount[pk(t1[0],t1[1])]||0)+1;
      pairCount[pk(t2[0],t2[1])]=(pairCount[pk(t2[0],t2[1])]||0)+1;
      gameCount[gk(allFour)]=(gameCount[gk(allFour)]||0)+1;
      [...t1,...t2].forEach(p=>{playCount[p]=(playCount[p]||0)+1;});
      res.push({r,c:c+1,t1,t2,resting:c===0?resting:[]});
    }
  }
  return res;
}

function getSlotColor(pid){const a=curAtt.find(a=>a.member_id===pid);return a?.slot?.hex_color||'var(--border2)';}
function getCourtName(courtId,courtNum){
  // prefer court_names text array on session
  const names=curSess?.court_names||[];
  if(names.length>=courtNum)return names[courtNum-1];
  // fallback to courts table
  if(courtId){const c=courts.find(c=>c.id===courtId);if(c)return c.name;}

function calcSessionStats(){
  // 세션 내 각 선수별 게임수, 휴식수
  const attIds=curAtt.map(a=>a.member_id);
  const gameCount={};
  attIds.forEach(id=>{gameCount[id]=0;});
  curMatches.forEach(m=>{
    [m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].filter(Boolean).forEach(id=>{
      if(gameCount[id]!==undefined)gameCount[id]++;
    });
  });
  return gameCount;
}

function getRoundResting(roundNum){
  // 해당 라운드에 출석하지만 경기 배정 안 된 선수
  const attIds=curAtt.map(a=>a.member_id);
  const roundMatches=curMatches.filter(m=>m.round===roundNum);
  const playing=new Set(roundMatches.flatMap(m=>[m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].filter(Boolean)));
  // 이 라운드에 참가 가능한 사람 중 경기 없는 사람
  return attIds.filter(id=>canPlayRound(id,roundNum)&&!playing.has(id));
}

function renderRounds(){
  const wrap=document.getElementById('roundsWrap');
  if(!curMatches.length){
    wrap.innerHTML=`<div class="empty" style="padding:32px 0;"><div class="empty-text" style="color:var(--text2);">출석 체크 후 자동 대진을 눌러보세요</div></div>`;
    return;
  }

  // 세션 통계 바
  const gameCount=calcSessionStats();
  const attIds=curAtt.map(a=>a.member_id);
  // 실제 대진이 있는 라운드 목록
  const activeRounds=[...new Set(curMatches.map(m=>m.round))];
  const statsHtml=curMatches.length===0?'':`<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;">
    <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin-bottom:8px;">개인별 게임/휴식</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${attIds.map(id=>{
        const p=gP(id);if(!p)return'';
        const g=gameCount[id]||0;
        // 실제 대진이 있는 라운드 중 이 선수가 참가 가능한 라운드 수
        const canPlayInActive=activeRounds.filter(r=>canPlayRound(id,r)).length;
        const rest=Math.max(0,canPlayInActive-g);
        const col=getSlotColor(id);
        return`<div style="display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg);border-radius:8px;font-size:12px;">
          <div style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0;"></div>
          <span style="font-weight:600;">${p.name}</span>
          <span style="color:var(--court);font-weight:700;">${g}게임</span>
          ${rest>0?`<span style="color:var(--text3);">휴${rest}</span>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // 라운드 정렬: 문자열 키 버그 방지 위해 숫자 정렬 명시
  const rds={};curMatches.forEach(m=>{if(!rds[m.round])rds[m.round]=[];rds[m.round].push(m);});
  const roundsHtml=Object.keys(rds).map(Number).sort((a,b)=>a-b).map(r=>{const ms=rds[r];
    const restIds=getRoundResting(Number(r));
    // 휴식존: 항상 표시 (빈 경우에도)
    const restCards=restIds.map(id=>{
      const p=gP(id);const col=getSlotColor(id);
      if(!p)return'';
      return CU?.is_admin
        ?`<div class="pc rest-card" data-mid="REST" data-field="rest-${r}-${id}" data-member="${id}"
            style="background:var(--white);border-color:var(--amber);">
            <div class="pdot" style="background:${col};"></div>
            <span class="pname" style="color:var(--amber);">${p.name}</span>
            <span class="grip">⠿</span>
          </div>`
        :`<div style="display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--white);border-radius:8px;font-size:12px;font-weight:600;color:var(--amber);">
            <div style="width:7px;height:7px;border-radius:50%;background:${col};"></div>${p.name}
          </div>`;
    }).join('');
    const restHtml=`<div style="padding:8px 12px 10px;background:var(--amber-bg);border-top:1px solid #fde68a;border-radius:0 0 10px 10px;">
      <div style="font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.4px;margin-bottom:${restIds.length?'6px':'0'};">
        휴식${restIds.length?` (${restIds.length}명)`:''}
      </div>
      ${restIds.length
        ?`<div style="display:flex;flex-wrap:wrap;gap:6px;">${restCards}</div>`
        :`<div style="font-size:11px;color:#b45309;opacity:.6;">없음</div>`
      }
    </div>`;
    return`<div class="round-section">
      <div class="round-head">
        <span class="round-label">Round ${r}</span>
        <button class="round-time-btn" onclick="${CU?.is_admin?`openRoundTimeEdit(${r})`:'void(0)'}">${getRoundTimeStr(Number(r))}</button>
      </div>
      <div style="background:var(--white);border:1px solid var(--border);border-bottom:none;padding:10px 12px;">
        ${ms.map(m=>renderMC(m)).join('')}
      </div>
      ${restHtml}
    </div>`;
  }).join('');

  wrap.innerHTML=statsHtml+roundsHtml;
  // 터치+마우스 드래그 초기화
  document.querySelectorAll('.pc,.rest-card').forEach(el=>initDrag(el));
}

function renderMC(m){
  const cname=getCourtName(m.court_id,m.court);
  const pCard=(field,memberId)=>{
    if(!memberId){
      // 모든 유저가 빈 슬롯 탭해서 선수 배정 가능
      return`<div class="empty-slot" id="es-${m.id}-${field}" data-mid="${m.id}" data-field="${field}"
          onclick="openSlotPick('${m.id}','${field}',${m.round})">빈 자리</div>`;
    }
    const p=gP(memberId);const col=getSlotColor(memberId);
    const isGuest=p?.type==='guest';
    return`<div class="pc" id="pc-${m.id}-${field}"
      data-mid="${m.id}" data-field="${field}" data-member="${memberId}"
      style="${isGuest?'border-color:#8B5CF6;background:#F5F3FF;':''}"
      onclick="openPlayerCardMenu('${m.id}','${field}','${memberId}',${m.round})">
      <div class="pdot" style="background:${col};"></div>
      <span class="pname" style="${isGuest?'color:#7C3AED;':''}">${p?p.name:'?'}</span>
      ${isGuest?'<span style="font-size:9px;font-weight:700;color:#7C3AED;background:#EDE9FE;padding:1px 4px;border-radius:3px;">G</span>':''}
      ${CU?.is_admin?'<span class="grip" style="font-size:13px;color:var(--text3);">⠿</span>':''}
    </div>`;
  };
  const has=m.score1!==null&&m.score2!==null;
  let scoreHtml='';
  if(has){
    const r1=m.score1>m.score2?'win':m.score1<m.score2?'lose':'draw';
    const r2=m.score2>m.score1?'win':m.score2<m.score1?'lose':'draw';
    const lb={win:'승',lose:'패',draw:'무'};
    scoreHtml=`<div class="score-result" onclick="openScoreUser('${m.id}')" style="cursor:pointer;">
      <div class="score-box"><span class="badge badge-${r1}">${lb[r1]}</span><span class="snum">${m.score1}</span></div>
      <div class="ssep2">:</div>
      <div class="score-box"><span class="snum">${m.score2}</span><span class="badge badge-${r2}">${lb[r2]}</span></div>
    </div>`;
  }else{
    scoreHtml=`<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;" onclick="openScoreUser('${m.id}')">점수 입력</button>`;
    if(CU?.is_admin){
      const qBtns=TENNIS_SCORES.map(([a,b])=>`<button class="sq-btn" onclick="setAndSaveScore('${m.id}',${a},${b})">${a}:${b}</button>`).join('');
      scoreHtml+=`<div class="score-quick" style="margin-top:6px;">${qBtns}</div>`;
    }
  }
  return`<div class="match-card" id="mc-${m.id}">
    <div class="court-lbl">${cname}</div>
    <div class="teams-row">
      <div class="team-col"><div class="team-lbl">TEAM 1</div>${pCard('team1_p1',m.team1_p1)}${pCard('team1_p2',m.team1_p2)}</div>
      <div style="display:flex;align-items:center;justify-content:center;width:20px;font-size:11px;font-weight:700;color:var(--text3);">VS</div>
      <div class="team-col"><div class="team-lbl">TEAM 2</div>${pCard('team2_p1',m.team2_p1)}${pCard('team2_p2',m.team2_p2)}</div>
    </div>
    ${scoreHtml}
  </div>`;
}


// ── DRAG & DROP ──
// ── 터치+마우스 통합 드래그앤드롭 ──
let touchDragEl=null,touchClone=null,touchOffX=0,touchOffY=0;

function initDrag(el){
  // 마우스
  el.addEventListener('mousedown',dragMouseDown,{passive:false});
  // 터치
  el.addEventListener('touchstart',dragTouchStart,{passive:false});
}

function dragMouseDown(e){
  // onclick과 구분: mousedown만 드래그 준비, 실제 이동 후 활성화
  startDrag(e.currentTarget,e.clientX,e.clientY);
  document.addEventListener('mousemove',dragMouseMove);
  document.addEventListener('mouseup',dragMouseUp);
}
function dragTouchStart(e){
  const t=e.touches[0];
  startDrag(e.currentTarget,t.clientX,t.clientY);
  document.addEventListener('touchmove',dragTouchMove,{passive:false});
  document.addEventListener('touchend',dragTouchEnd);
}

let pendingDrag=null; // 드래그 대기 상태
const DRAG_THRESHOLD=8; // 8px 이상 움직여야 드래그 시작

function startDrag(el,cx,cy){
  // 즉시 시작하지 않고 대기 상태로
  pendingDrag={el,cx,cy,started:false};
}
function activateDrag(el,cx,cy){
  touchDragEl=el;
  dragSrc={matchId:el.dataset.mid,field:el.dataset.field,memberId:el.dataset.member};
  const r=el.getBoundingClientRect();
  touchOffX=cx-r.left; touchOffY=cy-r.top;
  touchClone=el.cloneNode(true);
  touchClone.style.cssText=`position:fixed;z-index:9999;width:${r.width}px;opacity:.85;pointer-events:none;left:${r.left}px;top:${r.top}px;margin:0;box-shadow:0 4px 16px rgba(0,0,0,.2);`;
  document.body.appendChild(touchClone);
  el.classList.add('is-dragging');
}

function dragMouseMove(e){moveClone(e.clientX,e.clientY);}
function dragTouchMove(e){e.preventDefault();const t=e.touches[0];moveClone(t.clientX,t.clientY);}

function moveClone(cx,cy){
  // 드래그 대기 중이면 threshold 체크
  if(pendingDrag&&!pendingDrag.started){
    const dx=cx-pendingDrag.cx, dy=cy-pendingDrag.cy;
    if(Math.sqrt(dx*dx+dy*dy)<DRAG_THRESHOLD)return; // 아직 스크롤로 처리
    pendingDrag.started=true;
    activateDrag(pendingDrag.el,pendingDrag.cx,pendingDrag.cy);
  }
  if(!touchClone)return;
  touchClone.style.left=(cx-touchOffX)+'px';
  touchClone.style.top=(cy-touchOffY)+'px';
  // 하이라이트 타겟
  document.querySelectorAll('.drag-over-p').forEach(el=>el.classList.remove('drag-over-p'));
  touchClone.style.display='none';
  const el=document.elementFromPoint(cx,cy);
  touchClone.style.display='';
  const target=el?.closest('.pc,.empty-slot');
  if(target)target.classList.add('drag-over-p');
}

function dragMouseUp(e){
  document.removeEventListener('mousemove',dragMouseMove);
  document.removeEventListener('mouseup',dragMouseUp);
  finishDrag(e.clientX,e.clientY);
}
function dragTouchEnd(e){
  document.removeEventListener('touchmove',dragTouchMove);
  document.removeEventListener('touchend',dragTouchEnd);
  const t=e.changedTouches[0];
  finishDrag(t.clientX,t.clientY);
}

function finishDrag(cx,cy){
  const wasDragging=pendingDrag?.started;
  pendingDrag=null;
  if(touchClone){touchClone.remove();touchClone=null;}
  if(!wasDragging){touchDragEl=null;dragSrc=null;return;} // threshold 미달 = 클릭으로 처리
  document.querySelectorAll('.drag-over-p').forEach(el=>el.classList.remove('drag-over-p'));
  if(touchDragEl)touchDragEl.classList.remove('is-dragging');

  if(!dragSrc){touchDragEl=null;return;}

  // 드롭 타겟 찾기
  const tmp=touchDragEl;
  if(tmp)tmp.style.display='none'; // 본인 제외
  const el=document.elementFromPoint(cx,cy);
  if(tmp)tmp.style.display='';

  const target=el?.closest('.pc,.empty-slot');
  if(!target||target===touchDragEl){dragSrc=null;touchDragEl=null;return;}

  const tgt={
    matchId:target.dataset.mid,
    field:target.dataset.field,
    memberId:target.dataset.member||null
  };
  if(dragSrc.matchId===tgt.matchId&&dragSrc.field===tgt.field){dragSrc=null;touchDragEl=null;return;}
  swapPlayers(dragSrc,tgt);
  dragSrc=null;touchDragEl=null;
}

// 하위 호환 (HTML에서 inline으로 호출되는 것들 — 터치에선 안 쓰이지만 오류 방지)
function pcStart(e){}
function pcEnd(e){}
function pcOver(e){e.preventDefault();}
function pcLeave(e){}
function pcDrop(e){e.preventDefault();}
function esOver(e){e.preventDefault();}
function esLeave(e){}
function esDrop(e){e.preventDefault();}

async function swapPlayers(src,tgt){
  // 휴식자 카드(matchId===REST)에서 드래그한 경우
  // → 타겟 슬롯의 선수와 교체 (타겟 선수는 휴식자가 됨)
  const isRestSrc=src.matchId==='REST';
  const isRestTgt=tgt.matchId==='REST';

  if(isRestSrc&&isRestTgt){dragSrc=null;return;} // 휴식→휴식은 무의미

  if(isRestSrc){
    // 휴식자를 경기 슬롯에 넣기
    const tm=curMatches.find(m=>m.id===tgt.matchId);
    if(!tm)return;
    const tv=tm[tgt.field]; // 기존 슬롯의 선수 (경기→휴식으로 나감)
    tm[tgt.field]=src.memberId;
    ld(true);
    await db.from('matches').update({[tgt.field]:src.memberId}).eq('id',tm.id);
    ld(false);
    renderRounds();toast('✅ 대진 수정 완료');
    return;
  }

  if(isRestTgt){
    // 경기 중인 선수를 휴식으로 빼기 (슬롯을 null로)
    const sm=curMatches.find(m=>m.id===src.matchId);
    if(!sm)return;
    sm[src.field]=null;
    ld(true);
    await db.from('matches').update({[src.field]:null}).eq('id',sm.id);
    ld(false);
    renderRounds();toast('✅ 대진 수정 완료');
    return;
  }

  // 경기↔경기 스왑 (기존 로직)
  const sm=curMatches.find(m=>m.id===src.matchId);
  const tm=curMatches.find(m=>m.id===tgt.matchId);
  if(!sm||!tm)return;
  const sv=sm[src.field];const tv=tm[tgt.field];
  sm[src.field]=tv||null;tm[tgt.field]=sv||null;
  ld(true);
  const updates=[];
  updates.push(db.from('matches').update({[src.field]:tv||null}).eq('id',sm.id));
  if(sm.id!==tm.id)updates.push(db.from('matches').update({[tgt.field]:sv||null}).eq('id',tm.id));
  await Promise.all(updates);
  ld(false);
  renderRounds();toast('✅ 대진 수정 완료');
}

// ── 선수 카드 클릭 메뉴 (관리자) ──
function openPlayerCardMenu(matchId,field,memberId,roundNum){
  const m=curMatches.find(x=>x.id===matchId);
  const p=gP(memberId);
  if(!p||!m)return;
  document.getElementById('moPlayerCardTitle').textContent=p.name;
  document.getElementById('moPlayerCardSub').textContent=`R${roundNum} · ${getCourtName(m.court_id,m.court)}`;

  // 교체 가능한 선수 목록: 출석 중이고, 이 라운드에 아직 배정 안 된 사람
  const roundPlayers=new Set(
    curMatches.filter(x=>x.round===roundNum)
      .flatMap(x=>[x.team1_p1,x.team1_p2,x.team2_p1,x.team2_p2].filter(Boolean))
  );
  const attIds=curAtt.map(a=>a.member_id);
  const replaceable=attIds.filter(id=>
    id!==memberId&&
    canPlayRound(id,roundNum)&&
    !roundPlayers.has(id)
  ).sort((a,b)=>(gP(a)?.name||'').localeCompare(gP(b)?.name||'','ko'));

  document.getElementById('moPlayerCardBody').innerHTML=`
    ${CU?.is_admin?`<div style="margin-bottom:12px;">
      <button class="btn btn-danger btn-block" onclick="removePlayerFromSlot('${matchId}','${field}');cm('moPlayerCard');">
        ✕ ${p.name} 제거 (빈 슬롯으로)
      </button>
    </div>`:''}
    ${replaceable.length?`
    <div class="form-label" style="margin-bottom:8px;">다른 선수로 교체</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${replaceable.map(id=>{const rp=gP(id);const col=getSlotColor(id);return rp?`
        <div class="li" style="border-radius:10px;border:1px solid var(--border);cursor:pointer;"
          onclick="replacePlayerInSlot('${matchId}','${field}','${id}');cm('moPlayerCard');">
          <div style="width:8px;height:8px;border-radius:50%;background:${col};"></div>
          <span style="font-size:14px;font-weight:600;">${rp.name}</span>
        </div>`:''}).join('')}
    </div>`:'<div style="font-size:13px;color:var(--text2);">교체 가능한 선수가 없습니다</div>'}`;
  om('moPlayerCard');
}

async function removePlayerFromSlot(matchId,field){
  const m=curMatches.find(x=>x.id===matchId);if(!m)return;
  m[field]=null;
  ld(true);
  await db.from('matches').update({[field]:null}).eq('id',matchId);
  ld(false);
  renderRounds();toast('✅ 선수 제거 완료');
}

async function replacePlayerInSlot(matchId,field,newMemberId){
  const m=curMatches.find(x=>x.id===matchId);if(!m)return;
  m[field]=newMemberId;
  ld(true);
  await db.from('matches').update({[field]:newMemberId}).eq('id',matchId);
  ld(false);
  renderRounds();toast('✅ 선수 교체 완료');
}

// ── 빈 슬롯 클릭 (관리자) ──
function openSlotPick(matchId,field,roundNum){
  const m=curMatches.find(x=>x.id===matchId);if(!m)return;
  document.getElementById('moSlotPickSub').textContent=`R${roundNum} · ${getCourtName(m.court_id,m.court)}`;

  // 이 라운드에 이미 배정된 선수
  const roundPlayers=new Set(
    curMatches.filter(x=>x.round===roundNum)
      .flatMap(x=>[x.team1_p1,x.team1_p2,x.team2_p1,x.team2_p2].filter(Boolean))
  );
  const attIds=curAtt.map(a=>a.member_id);
  const pickable=attIds.filter(id=>canPlayRound(id,roundNum)&&!roundPlayers.has(id)).sort((a,b)=>(gP(a)?.name||'').localeCompare(gP(b)?.name||'','ko'));

  document.getElementById('moSlotPickBody').innerHTML=pickable.length
    ?`<div style="display:flex;flex-direction:column;gap:6px;">
      ${pickable.map(id=>{const p=gP(id);const col=getSlotColor(id);return p?`
        <div class="li" style="border-radius:10px;border:1px solid var(--border);cursor:pointer;"
          onclick="pickPlayerToSlot('${matchId}','${field}','${id}');cm('moSlotPick');">
          <div style="width:8px;height:8px;border-radius:50%;background:${col};"></div>
          <span style="font-size:14px;font-weight:600;">${p.name}</span>
        </div>`:''}).join('')}
    </div>`
    :`<div class="empty"><div class="empty-text">배정 가능한 선수가 없습니다<br><span style="font-size:12px;color:var(--text3);">이미 이 라운드에 모두 배정됨</span></div></div>`;
  om('moSlotPick');
}

async function pickPlayerToSlot(matchId,field,memberId){
  const m=curMatches.find(x=>x.id===matchId);if(!m)return;
  // 중복 체크
  const roundPlayers=[m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].filter(Boolean);
  if(roundPlayers.includes(memberId)){
    toast('⚠️ 이미 이 경기에 배정된 선수입니다');return;
  }
  m[field]=memberId;
  ld(true);
  await db.from('matches').update({[field]:memberId}).eq('id',matchId);
  ld(false);
  renderRounds();toast('✅ 선수 배정 완료');
}

function openScoreUser(matchId){
  const m=curMatches.find(x=>x.id===matchId);if(!m)return;
  scoreUserMatchId=matchId;
  const t1=[m.team1_p1,m.team1_p2].filter(Boolean).map(id=>gP(id)?.name||'?').join(' + ');
  const t2=[m.team2_p1,m.team2_p2].filter(Boolean).map(id=>gP(id)?.name||'?').join(' + ');
  document.getElementById('moScoreUserSub').textContent=`${t1}  vs  ${t2}`;

let memberRankCache={};

async function loadMemberRankCache(){
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const ranges={
    q:{s:new Date(y,Math.floor(mo/3)*3,1).toISOString().split('T')[0],e:now.toISOString().split('T')[0]},
    h:{s:new Date(y,mo<6?0:6,1).toISOString().split('T')[0],e:now.toISOString().split('T')[0]},
    yr:{s:new Date(y,0,1).toISOString().split('T')[0],e:now.toISOString().split('T')[0]}
  };
  const allMembers=members.filter(m=>m.active&&m.type==='regular');
  memberRankCache={};

  for(const[key,range] of Object.entries(ranges)){
    const ms=await fetchMatchesInRange(range.s,range.e);
    // 랭킹 페이지와 동일한 기준: 포인트(pts) → 세트득실 → 경기수
    const ranked=allMembers.map(p=>({id:p.id,...calcSt(ms,p.id)}))
      .filter(p=>p.g>0)
      .sort((a,b)=>b.pts-a.pts||b.setDiff-a.setDiff||b.g-a.g);
    ranked.forEach((p,i)=>{
      if(!memberRankCache[p.id])memberRankCache[p.id]={q:'-',h:'-',y:'-'};
      if(key==='q')memberRankCache[p.id].q=i+1;
      if(key==='h')memberRankCache[p.id].h=i+1;
      if(key==='yr')memberRankCache[p.id].y=i+1;
    });
  }
}

// ── STATS ──
function calcSt(matches,pid){
  let w=0,l=0,d=0,g=0,setDiff=0;
  matches.forEach(m=>{
    const i1=[m.team1_p1,m.team1_p2].includes(pid);
    const i2=[m.team2_p1,m.team2_p2].includes(pid);
    if(!i1&&!i2)return;
    g++;
    if(i1){
      setDiff+=(m.score1||0)-(m.score2||0);
      if(m.score1>m.score2)w++;
      else if(m.score1<m.score2)l++;
      else d++;
    }else{
      setDiff+=(m.score2||0)-(m.score1||0);
      if(m.score2>m.score1)w++;
      else if(m.score2<m.score1)l++;
      else d++;
    }
  });
  // 승률: 무는 분모 제외 (승/결정경기)
  const decisive=w+l;
  const wr=decisive>0?Math.round(w/decisive*100):0;
  // 포인트: 승5 무2 패1
  const pts=w*5+d*2+l*1;
  return{w,l,d,g,wr,setDiff,pts};
}
function calcPairs(matches,pid){
  const pairs={};
  matches.forEach(m=>{
    const i1=[m.team1_p1,m.team1_p2].includes(pid);
    const i2=[m.team2_p1,m.team2_p2].includes(pid);
    if(!i1&&!i2)return;
    const tm=i1?[m.team1_p1,m.team1_p2]:[m.team2_p1,m.team2_p2];
    const win=i1?m.score1>m.score2:m.score2>m.score1;
    const pt=tm.find(id=>id&&id!==pid);if(!pt)return;
    if(!pairs[pt])pairs[pt]={id:pt,w:0,g:0};pairs[pt].g++;if(win)pairs[pt].w++;
  });
  return Object.values(pairs).map(p=>({...p,wr:Math.round(p.w/p.g*100)}));
}

// 랭킹 쿼리: sessions 테이블 따로 조회 후 매칭
async function fetchMatchesInRange(s,e){
  const{data:sessList}=await db.from('sessions').select('id,date').gte('date',s).lte('date',e);
  if(!sessList||!sessList.length)return[];
  const ids=sessList.map(x=>x.id);
  // score1 NOT NULL — use filter after fetch to avoid Supabase null filter quirks
  const{data:ms}=await db.from('matches').select('*').in('session_id',ids);
  const scored=(ms||[]).filter(m=>m.score1!==null&&m.score2!==null);
  return scored.map(m=>{const sess=sessList.find(x=>x.id===m.session_id);return{...m,sessionDate:sess?.date};});
}

          const rankColor=i===0?'#F59E0B':i===1?'#9CA3AF':i===2?'#B45309':'var(--text3)';
          const rowBg=p.g===0?'background:var(--bg);opacity:.6;':'';
          return`<tr style="border-bottom:1px solid var(--border);${rowBg}">
            <td style="padding:10px 6px;text-align:center;font-weight:700;color:${p.g>0?rankColor:'var(--text3)'};">${p.g>0?i+1:'-'}</td>
            <td style="padding:10px 10px;font-weight:600;">${p.name}</td>
            <td style="padding:10px 6px;text-align:center;color:var(--text2);">${p.g}</td>
            <td style="padding:10px 6px;text-align:center;font-weight:700;color:var(--court);">${p.w}</td>
            <td style="padding:10px 6px;text-align:center;color:var(--amber);">${p.d}</td>
            <td style="padding:10px 6px;text-align:center;color:var(--text2);">${p.l}</td>
            <td style="padding:10px 6px;text-align:center;font-weight:600;color:var(--text2);">${p.g>0?p.wr+'%':'-'}</td>
            <td style="padding:10px 6px;text-align:center;font-weight:800;font-size:14px;color:${p.pts>0?'var(--red)':'var(--text3)'};">${p.pts}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  } else {
    // 페어 랭킹
    const pairs={};
    ms.forEach(m=>{
      const proc=(t1ids,t2ids,win)=>{
        if(t1ids.filter(Boolean).length<2)return;
        const key=[...t1ids].filter(Boolean).sort().join('|');
        if(!pairs[key])pairs[key]={ids:t1ids.filter(Boolean),w:0,l:0,g:0,setDiff:0};
        pairs[key].g++;
        if(win)pairs[key].w++;else pairs[key].l++;
        pairs[key].setDiff+=(m.score1||0)-(m.score2||0);
      };
      proc([m.team1_p1,m.team1_p2],[m.team2_p1,m.team2_p2],m.score1>m.score2);
      proc([m.team2_p1,m.team2_p2],[m.team1_p1,m.team1_p2],m.score2>m.score1);
    });
    const pairRanked=Object.values(pairs).map(p=>({...p,pts:p.w*5+(p.g-p.w-p.l)*2+p.l*1,wr:Math.round(p.w/Math.max(1,p.w+p.l)*100)}))
      .filter(p=>p.g>0).sort((a,b)=>b.pts-a.pts||b.setDiff-a.setDiff||b.g-a.g);

    const pairPointBasis=`<div style="display:flex;gap:10px;padding:8px 14px 10px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);flex-wrap:wrap;"><span style="font-weight:700;color:var(--text3);">포인트 기준:</span><span>🏆 승 <b style="color:var(--court);">5점</b></span><span>🤝 무 <b style="color:var(--amber);">2점</b></span><span>❌ 패 <b style="color:var(--text2);">1점</b></span></div>`;
    document.getElementById('rankList').innerHTML=pairRanked.length
      ?pairPointBasis+`<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="border-bottom:2px solid var(--border);background:var(--bg);">
            <th style="padding:8px 6px;text-align:center;width:28px;">#</th>
            <th style="padding:8px 10px;text-align:left;">페어</th>
            <th style="padding:8px 6px;text-align:center;">경기</th>
            <th style="padding:8px 6px;text-align:center;color:var(--court);">승</th>
            <th style="padding:8px 6px;text-align:center;color:var(--amber);">무</th>
            <th style="padding:8px 6px;text-align:center;color:var(--red);">패</th>
            <th style="padding:8px 6px;text-align:center;">승률</th>
            <th style="padding:8px 6px;text-align:center;color:var(--red);">POINT</th>
          </tr>
        </thead>
        <tbody>
          ${pairRanked.map((p,i)=>{
            const names=p.ids.map(id=>gP(id)?.name||'?').sort((a,b)=>a.localeCompare(b,'ko')).join(' + ');
            const draws=p.g-p.w-p.l;
            const decisive=p.w+p.l;
            const wr=decisive>0?Math.round(p.w/decisive*100):0;
            const pts=p.w*5+draws*2+p.l*1;
            return`<tr style="border-bottom:1px solid var(--border);">
              <td style="padding:10px 6px;text-align:center;font-weight:700;color:${i===0?'#F59E0B':i===1?'#9CA3AF':i===2?'#B45309':'var(--text3)'};">${i+1}</td>
              <td style="padding:10px 10px;font-weight:600;">${names}</td>
              <td style="padding:10px 6px;text-align:center;color:var(--text2);">${p.g}</td>
              <td style="padding:10px 6px;text-align:center;font-weight:700;color:var(--court);">${p.w}</td>
              <td style="padding:10px 6px;text-align:center;color:var(--amber);">${draws}</td>
              <td style="padding:10px 6px;text-align:center;color:var(--text2);">${p.l}</td>
              <td style="padding:10px 6px;text-align:center;font-weight:600;color:var(--text2);">${wr}%</td>
              <td style="padding:10px 6px;text-align:center;font-weight:800;font-size:14px;color:${pts>0?'var(--red)':'var(--text3)'};">${pts}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`
      :`<div class="empty"><div class="empty-text">기록이 없습니다</div></div>`;
  }
}

// ── MYPAGE ──
async function renderMyPage(){
  if(!CU)return;
  const{s,e}=getRange(curMP);ld(true);
  const ms=await fetchMatchesInRange(s,e);ld(false);
  const myMs=ms.filter(m=>[m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].includes(CU.id));
  const st=calcSt(myMs,CU.id);
  document.getElementById('myHero').innerHTML=`<div class="my-name">${CU.name}</div><div class="my-meta">${CU.gender==='M'?'남성':'여성'}</div><div class="my-sr"><div class="my-sb"><div class="my-sv">${st.w}</div><div class="my-sl">승</div></div><div class="my-sb"><div class="my-sv">${st.d}</div><div class="my-sl">무</div></div><div class="my-sb"><div class="my-sv">${st.l}</div><div class="my-sl">패</div></div><div class="my-sb"><div class="my-sv">${st.pts}</div><div class="my-sl">포인트</div></div></div>`;
  const allSt=members.filter(m=>m.active&&m.type==='regular').map(p=>({id:p.id,...calcSt(ms,p.id)})).filter(p=>p.g>0).sort((a,b)=>b.wr-a.wr);
  const myRank=allSt.findIndex(p=>p.id===CU.id)+1;
  const ps=calcPairs(myMs,CU.id);
  const best=[...ps].sort((a,b)=>b.wr-a.wr).slice(0,3);
  const worst=[...ps].sort((a,b)=>a.wr-b.wr).slice(0,3);
  const hist=myMs.slice().sort((a,b)=>(b.sessionDate||'').localeCompare(a.sessionDate||'')).slice(0,10);
  const lbl={quarter:getPeriodLabel('quarter'),half:getPeriodLabel('half'),year:getPeriodLabel('year'),all:'전체'};
  document.getElementById('myContent').innerHTML=`
    <div style="padding:0 20px 10px;">
      <div class="stat-row">
        <div class="stat-box"><div class="sv g">${st.w}</div><div class="sl">승</div></div>
        <div class="stat-box"><div class="sv" style="color:var(--amber);">${st.d}</div><div class="sl">무</div></div>
        <div class="stat-box"><div class="sv">${st.l}</div><div class="sl">패</div></div>
        <div class="stat-box"><div class="sv" style="color:var(--red);font-size:20px;">${st.pts}</div><div class="sl">포인트</div></div>
        <div class="stat-box"><div class="sv g">${st.g>0?st.wr+'%':'-'}</div><div class="sl">승률</div></div>
        <div class="stat-box"><div class="sv">${myRank||'-'}</div><div class="sl">${lbl[curMP]} 순위</div></div>
      </div>
    </div>
    ${best.length?`<div class="card" style="margin:0 20px 10px;"><div class="card-header"><div class="card-title">🏆 최고의 페어</div></div>${best.map((p,i)=>{const pl=gP(p.id);return pl?`<div class="pair-item"><div class="pr">${['🥇','🥈','🥉'][i]}</div><div class="pi"><div class="pn">${pl.name}</div><div class="ps">${p.w}승 ${p.g-p.w}패 · ${p.g}게임</div></div><div class="prate good">${p.wr}%</div></div>`:''}).join('')}</div>`:''}
    ${worst.length?`<div class="card" style="margin:0 20px 10px;"><div class="card-header"><div class="card-title">😅 최악의 페어</div></div>${worst.map((p,i)=>{const pl=gP(p.id);return pl?`<div class="pair-item"><div class="pr">${['😭','😢','😥'][i]}</div><div class="pi"><div class="pn">${pl.name}</div><div class="ps">${p.w}승 ${p.g-p.w}패 · ${p.g}게임</div></div><div class="prate bad">${p.wr}%</div></div>`:''}).join('')}</div>`:''}
    ${hist.length?`<div class="card" style="margin:0 20px 10px;"><div class="card-header"><div class="card-title">최근 게임 이력</div></div>${hist.map(m=>{const i1=[m.team1_p1,m.team1_p2].includes(CU.id);const ms2=i1?m.score1:m.score2;const os=i1?m.score2:m.score1;const res=ms2>os?'win':ms2<os?'lose':'draw';const lb={win:'승',lose:'패',draw:'무'};const t1=[m.team1_p1,m.team1_p2].filter(Boolean).map(id=>gP(id)?.name||'?');const t2=[m.team2_p1,m.team2_p2].filter(Boolean).map(id=>gP(id)?.name||'?');return`<div class="li" style="cursor:default;"><div style="flex:1;"><div style="font-size:12px;color:var(--text2);">${fmtD(m.sessionDate)} R${m.round}</div><div style="font-size:13px;font-weight:600;margin-top:2px;">${t1.join('+')} vs ${t2.join('+')}</div></div><div style="text-align:right;"><span class="badge badge-${res}">${lb[res]}</span><div style="font-size:14px;font-weight:700;margin-top:3px;">${ms2}:${os}</div></div></div>`;}).join('')}</div>`:''}`;
}
function switchMP(p,el){curMP=p;document.querySelectorAll('#page-mypage .pb2').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderMypageContent();}

// ── SETUP LIST (설정 페이지) ──
function renderSetupListPage(){
  document.getElementById('setupCount').textContent=`(${setups.length}/5)`;
  const list=document.getElementById('setupList');
  if(!setups.length){
    list.innerHTML=`<div class="empty"><div class="empty-text">저장된 셋업이 없습니다<br><span style="font-size:13px;color:var(--text3);">새 세션 만들기에서 셋업을 저장할 수 있어요</span></div></div>`;
    return;
  }
  list.innerHTML=setups.map(s=>{
    let rts=[];try{rts=JSON.parse(s.round_times||'[]');}catch{}
    const timeStr=rts.length?`${rts[0].s}~${rts[rts.length-1].e}`:'';
    const courts=(s.court_names||[]).join(', ');
    return`<div class="li">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:700;">${s.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">${s.rounds}R · ${timeStr} · ${courts}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="delSetup('${s.id}')">삭제</button>
    </div>`;
  }).join('');
}

async function delSetup(id){
  if(!confirm('셋업을 삭제할까요?'))return;
  ld(true);await db.from('session_setups').delete().eq('id',id);ld(false);
  setups=setups.filter(s=>s.id!==id);
  renderSetupListPage();renderSetupSelect();
}

// ── SLOTS ──
function renderSlots(){
  const list=document.getElementById('slotList');
  if(!slots.length){list.innerHTML=`<div class="empty"><div class="empty-text">시간대가 없습니다</div></div>`;return;}
  list.innerHTML=slots.map(s=>`<div class="li">
    <div style="width:12px;height:12px;border-radius:50%;background:${s.hex_color};flex-shrink:0;"></div>
    <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${s.label}</div><div style="font-size:12px;color:var(--text2);">${s.start_time}~${s.end_time}</div></div>
    <button class="btn btn-ghost btn-sm" onclick="openEditSlot('${s.id}')">수정</button>
    <button class="btn btn-danger btn-sm" onclick="delSlot('${s.id}')">삭제</button>
  </div>`).join('');
}
function renderCS(sel){document.getElementById('csWrap').innerHTML=COLORS.map(c=>`<div class="cs${c===sel?' sel':''}" style="background:${c};" onclick="selSwatch('${c}')"></div>`).join('');document.getElementById('slotColor').value=sel||'#3B82F6';}
function selSwatch(c){document.getElementById('slotColor').value=c;document.querySelectorAll('.cs').forEach(s=>s.classList.toggle('sel',s.style.background===c));}
function openAddSlot(){editSlotId=null;document.getElementById('slotTitle').textContent='시간대 추가';document.getElementById('slotLabel').value='';document.getElementById('slotStart').value='';document.getElementById('slotEnd').value='';renderCS('#3B82F6');om('moSlot');}
function openEditSlot(id){const s=slots.find(s=>s.id===id);if(!s)return;editSlotId=id;document.getElementById('slotTitle').textContent='시간대 수정';document.getElementById('slotLabel').value=s.label;document.getElementById('slotStart').value=s.start_time;document.getElementById('slotEnd').value=s.end_time;renderCS(s.hex_color);om('moSlot');}
async function saveSlot(){
  const label=document.getElementById('slotLabel').value.trim();
  const start=document.getElementById('slotStart').value;
  const end=document.getElementById('slotEnd').value;
  const color=document.getElementById('slotColor').value;
  if(!label||!start||!end){toast('모두 입력하세요');return;}
  ld(true);
  if(editSlotId){
    await db.from('time_slots').update({label,start_time:start,end_time:end,hex_color:color,color_name:label}).eq('id',editSlotId);
    const idx=slots.findIndex(s=>s.id===editSlotId);if(idx>=0)slots[idx]={...slots[idx],label,start_time:start,end_time:end,hex_color:color};
  }else{
    const{data}=await db.from('time_slots').insert({label,start_time:start,end_time:end,hex_color:color,color_name:label,sort_order:slots.length+1,active:true}).select().single();
    if(data)slots.push(data);
  }
  ld(false);cm('moSlot');renderSlots();toast('✅ 저장 완료');
}
async function delSlot(id){
  if(!confirm('삭제하시겠습니까?'))return;
  await db.from('time_slots').update({active:false}).eq('id',id);
  slots=slots.filter(s=>s.id!==id);renderSlots();
}

// ── COURTS ──
function renderCourtList(){
  const list=document.getElementById('courtList');
  if(!courts.length){list.innerHTML=`<div class="empty"><div class="empty-text">등록된 코트가 없습니다</div></div>`;return;}
  list.innerHTML=courts.map(c=>`<div class="li">
    <div style="flex:1;font-size:14px;font-weight:600;">${c.name}</div>
    <button class="btn btn-ghost btn-sm" onclick="openEditCourt('${c.id}')">수정</button>
    <button class="btn btn-danger btn-sm" onclick="delCourt('${c.id}')">삭제</button>
  </div>`).join('');
}
function openAddCourt(){editCourtId=null;document.getElementById('courtTitle').textContent='코트 추가';document.getElementById('courtName').value='';om('moCourt');}
function openEditCourt(id){const c=courts.find(c=>c.id===id);if(!c)return;editCourtId=id;document.getElementById('courtTitle').textContent='코트 수정';document.getElementById('courtName').value=c.name;om('moCourt');}
async function saveCourt(){
  const name=document.getElementById('courtName').value.trim();
  if(!name){toast('코트 이름을 입력하세요');return;}
  ld(true);
  if(editCourtId){
    await db.from('courts').update({name}).eq('id',editCourtId);
    const idx=courts.findIndex(c=>c.id===editCourtId);if(idx>=0)courts[idx].name=name;
  }else{
    const{data}=await db.from('courts').insert({name,sort_order:courts.length+1,active:true}).select().single();
    if(data)courts.push(data);
  }
  ld(false);cm('moCourt');renderCourtList();toast('✅ 저장 완료');
}
async function delCourt(id){
  if(!confirm('삭제하시겠습니까?'))return;
  await db.from('courts').update({active:false}).eq('id',id);
  courts=courts.filter(c=>c.id!==id);renderCourtList();
}

document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
init();
